<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Switch Day Finder</title>
</head>
<body>

    <h1>JavaScript Switch Day Finder</h1>

    <input
        type="number"
        id="dayInput"
        placeholder="Enter day number (1-7)"
        min="1"
        max="7"
    >

    <button id="showBtn">Find Day</button>

    <h2 id="result"></h2>

    <script src="script.js"></script>

</body>
</html>
