<!DOCTYPE html>
<html>
<head>
    <title>Student Registration</title>
</head>

<body>

<h1>Student Registration Form</h1>

<form>

    <div>
        <label for="name">
            Name:
        </label>

        <input 
            id="name"
            type="text"
            name="student_name"
        />
    </div>

    <br>

    <div>
        <label for="password">
            Password:
        </label>

        <input 
            id="password"
            type="password"
            name="password"
        />
    </div>

    <br>

    <div>
        <label for="email">
            Email:
        </label>

        <input
            id="email"
            type="email"
            name="email"
        />
    </div>

    <br>

    <div>
        <label for="dob">
            Date of Birth:
        </label>

        <input
            id="dob"
            type="date"
            name="dob"
        />
    </div>

    <br>

    <div>
        <label for="color">
            Favorite Color:
        </label>

        <input
            id="color"
            type="color"
            name="favorite_color"
        />
    </div>

</form>

</body>
</html>
