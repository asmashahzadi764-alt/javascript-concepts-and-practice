<!DOCTYPE html>
<html>
<head>
    <title>Student Registration</title>
</head>
<body>

<h1>Student Registration Form</h1>
<form>
    <h3>Gender</h3>
    <input
        type="radio"
        name="gender"
        value="male"
    > Male
    <input
        type="radio"
        name="gender"
        value="female"
    > Female
    <hr>
    <h3>Skills</h3>
    <input
        type="checkbox"
        name="skills"
        value="html"
    > HTML
    <input
        type="checkbox"
        name="skills"
        value="css"
    > CSS
    <input
        type="checkbox"
        name="skills"
        value="javascript"
    > JavaScript
    <hr>
    <h3>Upload CV</h3>
    <input
        type="file"
        accept=".pdf"
    >
    <br><br>
    <input type="submit">
</form>

</body>
</html>
