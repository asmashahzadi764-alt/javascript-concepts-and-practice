<!DOCTYPE html>
<html>
<head>
    <title>Student Registration</title>
</head>
<body>

<h1>Student Registration Form</h1>

<form>

    <h3>Gender</h3>

    <input
        type="radio"
        id="male-option"
        name="gender"
        value="male"
    >
    <label for="male-option">Male</label>

    <input
        type="radio"
        id="female-option"
        name="gender"
        value="female"
    >
    <label for="female-option">Female</label>

    <hr>

    <h3>Skills</h3>

    <input
        type="checkbox"
        id="html-skill"
        name="skills"
        value="html"
    >
    <label for="html-skill">HTML</label>

    <input
        type="checkbox"
        id="css-skill"
        name="skills"
        value="css"
    >
    <label for="css-skill">CSS</label>

    <input
        type="checkbox"
        id="javascript-skill"
        name="skills"
        value="javascript"
    >
    <label for="javascript-skill">JavaScript</label>

    <hr>

    <h3>Upload CV</h3>

    <label for="cv-upload">Choose PDF File:</label>

    <input
        type="file"
        id="cv-upload"
        accept=".pdf"
    >

    <br><br>

    <input type="submit" value="Submit">

</form>

</body>
</html>
