<!DOCTYPE html>
<html>
<head>
    <title>Form Submission Practice</title>
</head>
<body>

<h1>Student Registration</h1>
<form action="" method="GET">

    <div>
        <label for="name">Name:</label>
        <input
            id="name"
            type="text"
            name="student_name"
        >
    </div>

    <br>

    <div>
        <label for="email">Email:</label>
        <input
            id="email"
            type="email"
            name="email"
        >
    </div>

    <br>
    <input type="submit">
    <input type="reset">

</form>

</body>
</html>
