<!DOCTYPE html>
<html>
<head>
    <title>Validation Practice</title>
</head>
<body>

<h1>Student Registration</h1>

<form>
    <div>
        <label>Name:</label>
        <input
            type="text"
            required
            minlength="3"
            maxlength="20"
        >
    </div>
    <br>
    <div>
        <label>Age:</label>
        <input
            type="number"
            min="18"
            max="60"
        >
    </div>
    <br>
    <div>
        <label>Phone:</label>
        <input
            type="tel"
            pattern="[0-9]{11}"
            required
        >
    </div>
    <br>
    <input type="submit">
</form>
</body>
</html>
